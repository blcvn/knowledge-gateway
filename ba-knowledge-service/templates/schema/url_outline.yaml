name: "URD Outline"
type: "urd_outline"
version: "1.0"
description: "Outline structure for Use Case Requirements with tables and basic diagrams"

metadata:
  - name: "Module"
    pattern: '^> \*\*Module:\*\* .+$'
    required: true
  - name: "Version"
    pattern: '^> \*\*Version:\*\* .+$'
    required: true
  - name: "Created Date"
    pattern: '^> \*\*Created Date:\*\* .+$'
    required: true

sections:
  - id: "uc-mapping"
    title: "US → Use Case Mapping"
    level: 1
    type: "table"
    required: true
    pattern: '^# 1 US → Use Case Mapping$'
    table:
      headers: ["Use Case ID", "Use Case Name", "Related User Stories", "Priority", "Notes"]
      min_rows: 1
      allow_comment: true

  - id: "actor-definition"
    title: "Actor Definition"
    level: 1
    type: "section"
    required: true
    pattern: '^# 2 Actor Definition$'
    subsections:
      - id: "human-actors"
        title: "Human Actors"
        level: 2
        type: "table"
        required: true
        pattern: '^## 2\.1 Human Actors$'
        table:
          headers: ["Actor ID", "Name", "Description", "Persona/Role"]
          min_rows: 1
          allow_comment: true
      
      - id: "system-actors"
        title: "System Actors"
        level: 2
        type: "table"
        required: true
        pattern: '^## 2\.2 System Actors$'
        table:
          headers: ["Actor ID", "Name", "Description", "Type"]
          min_rows: 0
          allow_comment: true

  - id: "system-boundary"
    title: "System Boundary"
    level: 1
    type: "section"
    required: true
    pattern: '^# 3 System Boundary$'
    subsections:
      - id: "boundary-diagram"
        title: "Diagram"
        level: 2
        type: "diagram"
        required: true
        pattern: '^## 3\.1 Diagram$'
        diagram:
          type: "mermaid"
          allowed_types: ["graph TD", "graph LR", "flowchart"]
          forbidden_types: ["ascii"]
          required_pattern: '```mermaid'
          instructions: |
            Generate a Mermaid graph TD diagram representing the system boundary.
            CRITICAL:
            1. Use strictly ```mermaid code block.
            2. Do NOT use ASCII art.
            3. Define clear components and relationships.
        followed_by:
          type: "table"
          headers: ["System/Module", "Inside/Outside", "Responsibility", "Owner"]

  - id: "use-case-summary"
    title: "Use Case Summary Table"
    level: 1
    type: "table"
    required: true
    pattern: '^# 4 Use Case Summary Table$'
    table:
      headers: ["UC ID", "Name", "Actor", "Trigger", "Preconditions", "Postconditions", "Priority"]
      min_rows: 1
      allow_comment: true

  - id: "main-flow"
    title: "Main Flow Sketch (High-Level)"
    level: 1
    type: "iterative"
    required: true
    pattern: '^# 5 Main Flow Sketch \(High-Level\)$'
    repeatable: true
    repeat_pattern: '^## 5\.\d+ UC-\d+:'
    subsections:
      - id: "flow-sketch"
        title: "Flow Sketch"
        level: 3
        type: "diagram"
        required: true
        pattern: '^### 5\.\d+\.1 Flow Sketch:$'
        diagram:
          type: "mermaid"
          allowed_types: ["sequenceDiagram"]
          required_pattern: '```mermaid'
          instructions: |
            Generate a Mermaid sequenceDiagram for this Use Case flow.
            CRITICAL:
            1. Use strictly ```mermaid code block.
            2. Do NOT use ASCII art.
            3. Ensure correct participants and meaningful interaction flow.

  - id: "integration-touchpoints"
    title: "Integration Touchpoints"
    level: 1
    type: "table"
    required: true
    pattern: '^# 6 Integration Touchpoints$'
    table:
      headers: ["Use Case", "Step", "System", "Purpose", "Mode", "Error Handling"]
      min_rows: 0
      allow_comment: true

  - id: "data-entities"
    title: "Data Entities Overview"
    level: 1
    type: "section"
    required: true
    pattern: '^# 7 Data Entities Overview$'
    subsections:
      - id: "entities-diagram"
        title: "Diagram"
        level: 2
        type: "diagram"
        required: true
        pattern: '^## 7\.1 Diagram.*$'
        diagram:
          type: "mermaid"
          allowed_types: ["erDiagram"]
          required_pattern: '```mermaid'
          instructions: |
            Generate a Mermaid erDiagram for the data entities.
            CRITICAL:
            1. Use strictly ```mermaid code block.
            2. Do NOT use ASCII art.
            3. Define entities and their relationships clearly.
        followed_by:
          type: "table"
          headers: ["Entity", "Description", "States", "Relationships"]

  - id: "technical-notes"
    title: "Technical Notes & Concerns"
    level: 1
    type: "table"
    required: true
    pattern: '^# 8 Technical Notes & Concerns$'
    table:
      headers: ["ID", "Concern", "Affected UC", "Mitigation", "Owner"]
      min_rows: 0
      allow_comment: true

validation_rules:
  - name: "no-html-comments"
    pattern: '<!-- .+ -->'
    severity: "warning"
    message: "HTML comment blocks should be replaced with actual content"
  
  - name: "no-detailed-subsections"
    pattern: '^### 5\.\d+\.[2-7] '
    severity: "error"
    message: "URD Outline should not contain detailed subsections 5.x.2 through 5.x.7. These belong in URD Full."
server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: postgres
    source: host=localhost user=neo4j password=your_password dbname=kgs_platform port=5432 sslmode=disable TimeZone=Asia/Ho_Chi_Minh
  redis:
    network: tcp
    addr: 127.0.0.1:6379
    password: ""
    read_timeout: 0.2s
    write_timeout: 0.2s
  neo4j:
    uri: bolt://localhost:7687
    user: neo4j
    password: your_neo4j_password
    database: kgs
  opa:
    url: http://localhost:8181
  qdrant:
    host: localhost
    port: 6333
    collection: kgs-vectors-default
    vector_size: 1536
  nats:
    url: "nats://localhost:4222"
    stream: kgs-events
  embedding:
    provider: deterministic
    api_key: ""
    model: text-embedding-3-small
    base_url: https://api.openai.com/v1
    path: /ai/embeddings
    vector_size: 1536
    timeout: 15s
  ontology:
    validation_enabled: false
    strict_mode: false
    schema_validation: false
    edge_constraint_check: false
    sync_projection: false

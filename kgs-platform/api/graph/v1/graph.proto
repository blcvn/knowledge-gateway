syntax = "proto3";

package api.graph.v1;

import "google/api/annotations.proto";

option go_package = "kgs-platform/api/graph/v1;v1";

service Graph {
  // Create a new node in the Knowledge Graph
  rpc CreateNode (CreateNodeRequest) returns (CreateNodeReply) {
    option (google.api.http) = {
      post: "/v1/graph/nodes"
      body: "*"
    };
  }

  // Get a node by ID
  rpc GetNode (GetNodeRequest) returns (GetNodeReply) {
    option (google.api.http) = {
      get: "/v1/graph/nodes/{node_id}"
    };
  }

  // Create an edge between two nodes
  rpc CreateEdge (CreateEdgeRequest) returns (CreateEdgeReply) {
    option (google.api.http) = {
      post: "/v1/graph/edges"
      body: "*"
    };
  }
  // Get contextual neighborhood around a node
  rpc GetContext (GetContextRequest) returns (GraphReply) {
    option (google.api.http) = {
      get: "/v1/graph/nodes/{node_id}/context"
    };
  }

  // Get downstream impact of a node
  rpc GetImpact (GetImpactRequest) returns (GraphReply) {
    option (google.api.http) = {
      get: "/v1/graph/nodes/{node_id}/impact"
    };
  }

  // Get upstream coverage of a node
  rpc GetCoverage (GetCoverageRequest) returns (GraphReply) {
    option (google.api.http) = {
      get: "/v1/graph/nodes/{node_id}/coverage"
    };
  }

  // Get subgraph for a list of node IDs
  rpc GetSubgraph (GetSubgraphRequest) returns (GraphReply) {
    option (google.api.http) = {
      post: "/v1/graph/subgraph"
      body: "*"
    };
  }

  // Batch upsert entities
  rpc BatchUpsertEntities (BatchUpsertRequest) returns (BatchUpsertReply) {
    option (google.api.http) = {
      post: "/v1/graph/entities/batch"
      body: "*"
    };
  }

  // Hybrid search across vector and full-text indexes
  rpc HybridSearch (HybridSearchRequest) returns (HybridSearchReply) {
    option (google.api.http) = {
      post: "/v1/graph/search/hybrid"
      body: "*"
    };
  }

  // Create an overlay graph for session-scoped writes
  rpc CreateOverlay (CreateOverlayRequest) returns (CreateOverlayReply) {
    option (google.api.http) = {
      post: "/v1/graph/overlays"
      body: "*"
    };
  }

  // Commit overlay changes into base graph and create new version
  rpc CommitOverlay (CommitOverlayRequest) returns (CommitOverlayReply) {
    option (google.api.http) = {
      post: "/v1/graph/overlays/{overlay_id}/commit"
      body: "*"
    };
  }

  // Discard an overlay graph
  rpc DiscardOverlay (DiscardOverlayRequest) returns (DiscardOverlayReply) {
    option (google.api.http) = {
      delete: "/v1/graph/overlays/{overlay_id}"
    };
  }

  // List versions in current namespace
  rpc ListVersions (ListVersionsRequest) returns (ListVersionsReply) {
    option (google.api.http) = {
      get: "/v1/graph/versions"
    };
  }

  // Diff two versions in current namespace
  rpc DiffVersions (DiffVersionsRequest) returns (DiffVersionsReply) {
    option (google.api.http) = {
      get: "/v1/graph/versions/diff"
    };
  }

  // Rollback current namespace to target version
  rpc RollbackVersion (RollbackVersionRequest) returns (RollbackVersionReply) {
    option (google.api.http) = {
      post: "/v1/graph/versions/{version_id}/rollback"
      body: "*"
    };
  }
}

message CreateNodeRequest {
  string label = 1;
  string properties_json = 2; // raw JSON string of properties
}

message CreateNodeReply {
  string node_id = 1;
  string label = 2;
  string properties_json = 3;
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeReply {
  string node_id = 1;
  string label = 2;
  string properties_json = 3;
}

message CreateEdgeRequest {
  string source_node_id = 1;
  string target_node_id = 2;
  string relation_type = 3;
  string properties_json = 4;
}

message CreateEdgeReply {
  string edge_id = 1;
  string source_node_id = 2;
  string target_node_id = 3;
  string relation_type = 4;
  string properties_json = 5;
}

message GetContextRequest {
  string node_id = 1;
  int32 depth = 2;
  string direction = 3; // INCOMING, OUTGOING, BOTH (default)
  int32 page_size = 4;
  string page_token = 5;
}

message GetImpactRequest {
  string node_id = 1;
  int32 max_depth = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GetCoverageRequest {
  string node_id = 1;
  int32 max_depth = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GetSubgraphRequest {
  repeated string node_ids = 1;
}

message GraphNode {
  string id = 1;
  string label = 2;
  string properties_json = 3;
}

message GraphEdge {
  string id = 1;
  string source = 2;
  string target = 3;
  string type = 4;
  string properties_json = 5;
}

message GraphReply {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

message BatchEntity {
  string label = 1;
  string properties_json = 2;
}

message BatchUpsertRequest {
  repeated BatchEntity entities = 1;
}

message BatchUpsertReply {
  int32 created = 1;
  int32 updated = 2;
  int32 skipped = 3;
}

message HybridSearchRequest {
  string query = 1;
  int32 top_k = 2;
  double alpha = 3;
  double beta = 4;
  repeated string entity_types = 5;
  repeated string domains = 6;
  double min_confidence = 7;
  repeated string provenance_types = 8;
}

message HybridSearchResult {
  string node_id = 1;
  string label = 2;
  string properties_json = 3;
  double score = 4;
  double semantic_score = 5;
  double text_score = 6;
  double centrality = 7;
}

message HybridSearchReply {
  repeated HybridSearchResult results = 1;
}

message CreateOverlayRequest {
  string session_id = 1;
  string base_version = 2;
}

message CreateOverlayReply {
  string overlay_id = 1;
  string status = 2;
  string base_version_id = 3;
  string ttl = 4;
}

message CommitOverlayRequest {
  string overlay_id = 1;
  string conflict_policy = 2;
}

message CommitOverlayReply {
  string new_version_id = 1;
  int32 entities_committed = 2;
  int32 edges_committed = 3;
  int32 conflicts_resolved = 4;
}

message DiscardOverlayRequest {
  string overlay_id = 1;
}

message DiscardOverlayReply {
  string overlay_id = 1;
  string status = 2;
}

message VersionInfo {
  string version_id = 1;
  string parent_id = 2;
  string commit_message = 3;
  int64 created_at_unix = 4;
}

message ListVersionsRequest {}

message ListVersionsReply {
  repeated VersionInfo versions = 1;
}

message DiffVersionsRequest {
  string from_version_id = 1;
  string to_version_id = 2;
}

message DiffVersionsReply {
  string from_version_id = 1;
  string to_version_id = 2;
  int32 entities_added = 3;
  int32 entities_modified = 4;
  int32 entities_deleted = 5;
  int32 edges_added = 6;
  int32 edges_modified = 7;
  int32 edges_deleted = 8;
}

message RollbackVersionRequest {
  string version_id = 1;
  string reason = 2;
}

message RollbackVersionReply {
  string rollback_version_id = 1;
}

syntax = "proto3";
package kratos.api;

option go_package = "kgs-platform/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    string password = 3;
    google.protobuf.Duration read_timeout = 4;
    google.protobuf.Duration write_timeout = 5;
  }
  message Neo4j {
    string uri = 1;
    string user = 2;
    string password = 3;
    string database = 4;
  }
  message OPA {
    string url = 1;
  }
  message Qdrant {
    string host = 1;
    int32 port = 2;
    string collection = 3;
    int32 vector_size = 4;
  }
  message NATS {
    string url = 1;
    string stream = 2;
  }
  Database database = 1;
  Redis redis = 2;
  Neo4j neo4j = 3;
  OPA opa = 4;
  Qdrant qdrant = 5;
  NATS nats = 6;
}

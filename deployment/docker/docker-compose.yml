networks:
  kgs-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  opa_policies:


services:

  # ---------------------------------------------------------------------------
  # PostgreSQL – relational store for App Registry, Rules, Policies
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: kgs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kgs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kgspassword}
      POSTGRES_DB: ${POSTGRES_DB:-kgs_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kgs-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kgs} -d ${POSTGRES_DB:-kgs_platform}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis – caching and event streaming (Redis Streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kgs_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kgs-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j – graph database backend
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.15-community
    container_name: kgs_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474" # Neo4j Browser (HTTP)
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - kgs-net
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4jpassword}", "RETURN 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # OPA – Open Policy Agent for attribute-based access control
  # ---------------------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:latest
    container_name: kgs_opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "--addr=0.0.0.0:8181"
      - "--set=decision_logs.console=true"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - opa_policies:/policies
    networks:
      - kgs-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8181/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # KGS Platform – main Go/Kratos application
  # ---------------------------------------------------------------------------
  kgs-platform:
    build:
      context: ../../kgs-platform
      dockerfile: Dockerfile
    image: kgs-platform:latest
    container_name: kgs_platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opa:
        condition: service_healthy
    ports:
      - "8000:8000" # HTTP API
      - "9000:9000" # gRPC
    volumes:
      - ./config:/data/conf
    environment:
      # These are exported as OS env vars; config.yaml references can be
      # overridden via Kratos env substitution if you enable it.
      POSTGRES_USER: ${POSTGRES_USER:-kgs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kgspassword}
      POSTGRES_DB: ${POSTGRES_DB:-kgs_platform}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
    networks:
      - kgs-net
